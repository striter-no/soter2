[project]
name = soter2_proxy
version = 0.0.1

[files]
sources = *.c
output = proxy

[dirs]
includes = include ../providers/include ../lownet/include ../base/include ../protocol/include
src = src
output = lib

[compiler]
build = static
cleanup = false

[flags]
common = -std=c11 -Wall -Wextra -Wpedantic -D_GNU_SOURCE

[modes]
active = debug

[mode.debug]
flags = -g -O0

[mode.release]
flags = -O3
