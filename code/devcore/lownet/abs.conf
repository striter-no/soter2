[project]
name = soter2_lownet
version = 0.0.1

[files]
sources = *.c
output = lownet

[dirs]
includes = include
src = src
output = lib

[compiler]
build = static
cleanup = false

[flags]
common = -std=c23 -Wall -Wextra -Wpedantic -D_GNU_SOURCE

[modes]
active = debug

[mode.debug]
flags = -g  -O0

[mode.release]
flags = -O3

