[project]
name = soter2_rudp
version = 0.0.1

[files]
sources = *.c
output = rudp

[dirs]
includes = include ../protocol/include ../lownet/include ../base/include ../providers/include
libs = ../lownet/lib ../protocol/lib ../base/lib
src = src
output = lib

[compiler]
build = static
cleanup = false

[dependencies]
libs = ../lownet/lib/* ../protocol/lib/* ../base/lib/*

[modules]
providers = ../providers, abs.conf

[flags]
common = -std=c11 -Wall -Wextra -Wpedantic -D_GNU_SOURCE

[modes]
active = debug

[mode.debug]
flags = -g -O0

[mode.release]
flags = -O3
