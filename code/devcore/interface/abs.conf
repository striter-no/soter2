[project]
name = soter2_interface
version = 0.0.1

[files]
sources = *.c
output = interface

[compiler]
build = static
cleanup = false

[dirs]
output = lib
includes = include ../e2ee/include ../uhttp/include ../providers/include ../turn/include ../peersyst/include ../turn/include ../rudp/include ../stating/include ../gossip/include ../natpunch/include ../watcher/include ../protocol/include ../lownet/include ../crypto/include ../logging/include ../base/include
src = src

[flags]
common = -std=c11 -Wall -Wextra -Wpedantic -D_GNU_SOURCE

[modes]
active = debug

[mode.debug]
flags = -g  -O0

[mode.release]
flags = -O3
